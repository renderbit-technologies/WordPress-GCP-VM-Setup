name: Bash Scripts Test (Vagrant)

on:
  push:
    branches: [main]
    paths:
      - "*.sh"
      - "tests/bash/**"
      - ".github/workflows/bash-test.yml"
  pull_request:
    branches: [main]
    paths:
      - "*.sh"
      - "tests/bash/**"
      - ".github/workflows/bash-test.yml"
  workflow_dispatch:
  schedule:
    - cron: "15 2 * * *"

jobs:
  vagrant-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 45
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Cache Vagrant boxes
        uses: actions/cache@v4
        with:
          path: ~/.vagrant.d/boxes
          key: ${{ runner.os }}-vagrant-${{ hashFiles('tests/bash/Vagrantfile') }}
          restore-keys: ${{ runner.os }}-vagrant-

      - name: Install VirtualBox
        run: |
          sudo apt-get update
          # Removing virtualbox-ext-pack as it requires interactive license acceptance
          sudo apt-get install -y virtualbox

      - name: Install Vagrant
        run: |
          wget -O- https://apt.releases.hashicorp.com/gpg | sudo gpg --dearmor -o /usr/share/keyrings/hashicorp-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/hashicorp.list
          sudo apt-get update
          sudo apt-get install -y vagrant
          vagrant --version

      - name: Run vagrant up
        run: |
          cd tests/bash
          sudo rmmod kvm_amd || true
          sudo rmmod kvm_intel || true
          sudo rmmod kvm || true
          vagrant up --provider=virtualbox

      - name: Verify deployment (internal)
        run: |
          cd tests/bash
          # The verification is already inside Vagrant provisioner, but we can double check here
          # Host header is needed as per provisioner logic
          vagrant ssh -c 'curl -I -H "Host: vagrant.local" http://localhost'

      - name: Idempotency check
        run: |
          cd tests/bash
          vagrant provision
          vagrant ssh -c 'curl -I -H "Host: vagrant.local" http://localhost'
