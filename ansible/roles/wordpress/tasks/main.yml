---
# --------------------------------------------------------
# PPAs and Package Installation
# --------------------------------------------------------
- name: Add PHP PPA
  ansible.builtin.apt_repository:
    repo: "ppa:ondrej/php"
    state: present
    update_cache: true

- name: Add Nginx PPA
  ansible.builtin.apt_repository:
    repo: "ppa:ondrej/nginx"
    state: present
    update_cache: true

- name: Install Nginx, PHP 8.4, MariaDB, Certbot
  ansible.builtin.apt:
    name:
      - nginx
      - mariadb-server
      - php8.4
      - php8.4-fpm
      - php8.4-cli
      - php8.4-mysql
      - php8.4-xml
      - php8.4-curl
      - php8.4-mbstring
      - php8.4-zip
      - php8.4-gd
      - php8.4-intl
      - php8.4-opcache
      - php8.4-imagick
      - certbot
      - python3-certbot-nginx
    state: present

# --------------------------------------------------------
# Enable Services
# --------------------------------------------------------
- name: Enable and start Nginx
  ansible.builtin.service:
    name: nginx
    state: started
    enabled: true

- name: Enable and start PHP-FPM
  ansible.builtin.service:
    name: php8.4-fpm
    state: started
    enabled: true

- name: Enable and start MariaDB
  ansible.builtin.service:
    name: mariadb
    state: started
    enabled: true

# --------------------------------------------------------
# PHP-FPM Pool Tuning
# --------------------------------------------------------
- name: Gather CPU core count for FPM tuning
  ansible.builtin.set_fact:
    wordpress_php_cores: "{{ ansible_processor_vcpus | default(1) }}"

- name: Calculate FPM pool parameters
  ansible.builtin.set_fact:
    wordpress_fpm_max_children: "{{ [wordpress_php_cores | int * 5, 5] | max }}"
    wordpress_fpm_start_servers: "{{ [wordpress_php_cores | int * 2, 2] | max }}"
    wordpress_fpm_min_spare_servers: "{{ [wordpress_php_cores | int, 1] | max }}"
    wordpress_fpm_max_spare_servers: "{{ [wordpress_php_cores | int * 3, 3] | max }}"
    wordpress_fpm_max_requests: 500

- name: Tune PHP-FPM pool (pm = dynamic)
  ansible.builtin.lineinfile:
    path: /etc/php/8.4/fpm/pool.d/www.conf
    regexp: "^{{ item.key }} ="
    line: "{{ item.key }} = {{ item.value }}"
    backrefs: false
  loop:
    - { key: "pm", value: "dynamic" }
    - { key: "pm.max_children", value: "{{ wordpress_fpm_max_children }}" }
    - { key: "pm.start_servers", value: "{{ wordpress_fpm_start_servers }}" }
    - { key: "pm.min_spare_servers", value: "{{ wordpress_fpm_min_spare_servers }}" }
    - { key: "pm.max_spare_servers", value: "{{ wordpress_fpm_max_spare_servers }}" }
    - { key: "pm.max_requests", value: "{{ wordpress_fpm_max_requests }}" }
  notify: Restart PHP-FPM

- name: Ensure FPM listen owner/group is www-data
  ansible.builtin.lineinfile:
    path: /etc/php/8.4/fpm/pool.d/www.conf
    regexp: "^{{ item.key }} ="
    line: "{{ item.key }} = {{ item.value }}"
  loop:
    - { key: "listen.owner", value: "www-data" }
    - { key: "listen.group", value: "www-data" }
  notify: Restart PHP-FPM

# --------------------------------------------------------
# PHP.ini Tuning
# --------------------------------------------------------
- name: Tune php.ini for FPM
  ansible.builtin.lineinfile:
    path: /etc/php/8.4/fpm/php.ini
    regexp: "^;?{{ item.key }} ="
    line: "{{ item.key }} = {{ item.value }}"
  loop:
    - { key: "memory_limit", value: "256M" }
    - { key: "upload_max_filesize", value: "64M" }
    - { key: "post_max_size", value: "64M" }
    - { key: "max_execution_time", value: "300" }
    - { key: "realpath_cache_size", value: "4096k" }
    - { key: "realpath_cache_ttl", value: "600" }
  notify: Restart PHP-FPM

# --------------------------------------------------------
# OPcache Configuration
# --------------------------------------------------------
- name: Configure OPcache
  ansible.builtin.template:
    src: opcache.ini.j2
    dest: /etc/php/8.4/mods-available/opcache.ini
    owner: root
    group: root
    mode: "0644"
  notify: Restart PHP-FPM

# --------------------------------------------------------
# phpMyAdmin Installation
# --------------------------------------------------------
- name: Check if phpMyAdmin is installed
  ansible.builtin.stat:
    path: /usr/share/phpmyadmin
  register: wordpress_pma_check

- name: Download phpMyAdmin
  ansible.builtin.get_url:
    url: https://www.phpmyadmin.net/downloads/phpMyAdmin-latest-all-languages.zip
    dest: /tmp/pma.zip
    mode: "0644"
  when: not wordpress_pma_check.stat.exists

- name: Unzip phpMyAdmin
  ansible.builtin.unarchive:
    src: /tmp/pma.zip
    dest: /tmp/
    remote_src: true
  when: not wordpress_pma_check.stat.exists

- name: Find phpMyAdmin extracted directory
  ansible.builtin.find:
    paths: /tmp
    patterns: "phpMyAdmin-*-all-languages"
    file_type: directory
  register: wordpress_pma_dir
  when: not wordpress_pma_check.stat.exists

- name: Move phpMyAdmin to /usr/share/phpmyadmin
  ansible.builtin.command: "mv {{ wordpress_pma_dir.files[0].path }} /usr/share/phpmyadmin"
  args:
    creates: /usr/share/phpmyadmin/index.php
  changed_when: true
  when: not wordpress_pma_check.stat.exists and wordpress_pma_dir.files | length > 0

- name: Copy phpMyAdmin sample config
  ansible.builtin.copy:
    src: /usr/share/phpmyadmin/config.sample.inc.php
    dest: /usr/share/phpmyadmin/config.inc.php
    remote_src: true
    owner: www-data
    group: www-data
    mode: "0640"
    force: false # Don't overwrite if already configured

- name: Inject blowfish secret into phpMyAdmin config
  ansible.builtin.replace:
    path: /usr/share/phpmyadmin/config.inc.php
    regexp: "\\$cfg\\['blowfish_secret'\\] = '';"
    replace: "$cfg['blowfish_secret'] = '{{ pma_blowfish }}';"

- name: Set phpMyAdmin ownership
  ansible.builtin.file:
    path: /usr/share/phpmyadmin
    state: directory
    owner: www-data
    group: www-data
    mode: "0755"
    recurse: true

- name: Create phpMyAdmin tmp directory
  ansible.builtin.file:
    path: /usr/share/phpmyadmin/tmp
    state: directory
    owner: www-data
    group: www-data
    mode: "0777"

- name: Clean up phpMyAdmin zip
  ansible.builtin.file:
    path: /tmp/pma.zip
    state: absent

# --------------------------------------------------------
# MariaDB Database & Hardening
# --------------------------------------------------------
- name: Create MariaDB Database
  community.mysql.mysql_db:
    name: "{{ wp_db_name }}"
    state: present
    login_unix_socket: /var/run/mysqld/mysqld.sock

- name: Create MariaDB User
  community.mysql.mysql_user:
    name: "{{ wp_db_user }}"
    password: "{{ wp_db_pass }}"
    priv: "{{ wp_db_name }}.*:ALL"
    host: localhost
    state: present
    login_unix_socket: /var/run/mysqld/mysqld.sock

- name: Remove anonymous MySQL users
  community.mysql.mysql_user:
    name: ""
    host_all: true
    state: absent
    login_unix_socket: /var/run/mysqld/mysqld.sock
  failed_when: false

- name: Drop test database
  community.mysql.mysql_db:
    name: test
    state: absent
    login_unix_socket: /var/run/mysqld/mysqld.sock
  failed_when: false

- name: Set MariaDB root password
  community.mysql.mysql_user:
    name: root
    password: "{{ mysql_root_pass }}"
    host: localhost
    login_unix_socket: /var/run/mysqld/mysqld.sock
  failed_when: false


- name: Create .my.cnf for root
  ansible.builtin.template:
    src: root-my.cnf.j2
    dest: /root/.my.cnf
    owner: root
    group: root
    mode: "0600"
# --------------------------------------------------------
# Install WP-CLI
# --------------------------------------------------------
- name: Install WP-CLI
  ansible.builtin.get_url:
    url: https://raw.githubusercontent.com/wp-cli/builds/gh-pages/phar/wp-cli.phar
    dest: /usr/local/bin/wp
    mode: "0755"

# --------------------------------------------------------
# Nginx Configuration
# --------------------------------------------------------
- name: Create Web Root
  ansible.builtin.file:
    path: /var/www/{{ domain }}
    state: directory
    owner: www-data
    group: www-data
    mode: "0775"

- name: Deploy Nginx security headers snippet
  ansible.builtin.template:
    src: security-headers.conf.j2
    dest: /etc/nginx/snippets/security-headers.conf
    owner: root
    group: root
    mode: "0644"
  notify: Restart Nginx

- name: Deploy Nginx site configuration
  ansible.builtin.template:
    src: nginx-site.conf.j2
    dest: /etc/nginx/sites-available/{{ domain }}
    owner: root
    group: root
    mode: "0644"
  notify: Restart Nginx

- name: Enable Nginx Site
  ansible.builtin.file:
    src: /etc/nginx/sites-available/{{ domain }}
    dest: /etc/nginx/sites-enabled/{{ domain }}
    state: link
  notify: Restart Nginx

- name: Remove Default Nginx Site
  ansible.builtin.file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  notify: Restart Nginx

# --------------------------------------------------------
# WordPress Download, Config & Install
# --------------------------------------------------------
- name: Check if WP is installed
  ansible.builtin.stat:
    path: /var/www/{{ domain }}/wp-config.php
  register: wordpress_wp_config_check

- name: Download WordPress
  become: true
  become_user: www-data
  ansible.builtin.command: wp core download --path=/var/www/{{ domain }} --skip-content --force
  args:
    creates: /var/www/{{ domain }}/wp-settings.php
  when: not wordpress_wp_config_check.stat.exists

- name: Configure WordPress
  become: true
  become_user: www-data
  ansible.builtin.shell: |
    wp config create \
    --dbname={{ wp_db_name }} \
    --dbuser={{ wp_db_user }} \
    --dbpass={{ wp_db_pass }} \
    --locale=en_US \
    --path=/var/www/{{ domain }} \
    --force
  args:
    creates: /var/www/{{ domain }}/wp-config.php
  when: not wordpress_wp_config_check.stat.exists

- name: Install WordPress
  become: true
  become_user: www-data
  ansible.builtin.shell: |
    wp core install \
    --url=http://{{ domain }} \
    --title="{{ domain }}" \
    --admin_user={{ wp_admin_user }} \
    --admin_password={{ wp_admin_pass }} \
    --admin_email={{ admin_email }} \
    --path=/var/www/{{ domain }} \
    --skip-email
  changed_when: false
  when: not wordpress_wp_config_check.stat.exists
  failed_when: false

# --------------------------------------------------------
# wp-config.php Security Injections
# --------------------------------------------------------
- name: Inject security settings into wp-config.php
  ansible.builtin.blockinfile:
    path: /var/www/{{ domain }}/wp-config.php
    insertbefore: "require_once ABSPATH . 'wp-settings.php';"
    marker: "/* {mark} ANSIBLE MANAGED SECURITY BLOCK */"
    block: |
      /** SSL/Reverse Proxy Fix (added by installer) */
      if (isset($_SERVER['HTTP_X_FORWARDED_PROTO']) && $_SERVER['HTTP_X_FORWARDED_PROTO'] === 'https') {
          $_SERVER['HTTPS'] = 'on';
      }

      /** Security & auto-update settings */
      define('FS_METHOD', 'direct');
      define('DISALLOW_FILE_EDIT', true);
      define('WP_AUTO_UPDATE_CORE', 'minor');
      if ( ! defined('FORCE_SSL_ADMIN') ) define('FORCE_SSL_ADMIN', true);

# --------------------------------------------------------
# XML-RPC MU-Plugin
# --------------------------------------------------------
- name: Create MU-plugins directory
  ansible.builtin.file:
    path: /var/www/{{ domain }}/wp-content/mu-plugins
    state: directory
    owner: www-data
    group: www-data
    mode: "0775"

- name: Deploy XML-RPC mitigation MU-plugin
  ansible.builtin.copy:
    src: disable-xmlrpc-pingback.php
    dest: /var/www/{{ domain }}/wp-content/mu-plugins/disable-xmlrpc-pingback.php
    owner: www-data
    group: www-data
    mode: "0664"

# --------------------------------------------------------
# Remove Version Info Files
# --------------------------------------------------------
- name: Remove readme.html and license.txt
  ansible.builtin.file:
    path: "/var/www/{{ domain }}/{{ item }}"
    state: absent
  loop:
    - readme.html
    - license.txt

# --------------------------------------------------------
# Remove Default Admin User & Set Roles
# --------------------------------------------------------
- name: Check if default admin user exists
  become: true
  become_user: www-data
  ansible.builtin.command: wp user get admin --field=ID --path=/var/www/{{ domain }}
  register: wordpress_admin_user_check
  failed_when: false
  changed_when: false

- name: Remove default admin user
  become: true
  become_user: www-data
  ansible.builtin.command: "wp user delete admin --reassign={{ wp_admin_user }} --path=/var/www/{{ domain }}"
  changed_when: wordpress_admin_user_check.rc == 0
  when: wordpress_admin_user_check.rc == 0
  failed_when: false

- name: Ensure admin user has administrator role
  become: true
  become_user: www-data
  ansible.builtin.command: "wp user set-role {{ wp_admin_user }} administrator --path=/var/www/{{ domain }}"
  failed_when: false
  changed_when: false

# --------------------------------------------------------
# Install Essential Plugins
# --------------------------------------------------------
- name: Install essential WordPress plugins
  become: true
  become_user: www-data
  ansible.builtin.shell: |
    wp plugin install \
    jetpack \
    akismet \
    jetpack-protect \
    jetpack-boost \
    amp \
    sucuri-scanner \
    wordfence \
    wp-mail-smtp \
    cloudflare-flexible-ssl \
    google-analytics-for-wordpress \
    updraftplus \
    better-search-replace \
    --path=/var/www/{{ domain }}
  changed_when: false
  failed_when: false

# --------------------------------------------------------
# Enable Plugin/Theme Auto-Updates
# --------------------------------------------------------
- name: Enable plugin auto-updates
  become: true
  become_user: www-data
  ansible.builtin.command: "wp plugin auto-updates enable --all --path=/var/www/{{ domain }}"
  failed_when: false
  changed_when: false

- name: Enable theme auto-updates
  become: true
  become_user: www-data
  ansible.builtin.command: "wp theme auto-updates enable --all --path=/var/www/{{ domain }}"
  failed_when: false
  changed_when: false

# --------------------------------------------------------
# Weekly WP Update Cron Job
# --------------------------------------------------------
- name: Deploy weekly WP update cron script
  ansible.builtin.template:
    src: wp-updates.sh.j2
    dest: /etc/cron.weekly/wp-updates
    owner: root
    group: root
    mode: "0750"

# --------------------------------------------------------
# SSL via Certbot (conditional)
# --------------------------------------------------------
- name: Run Certbot to obtain SSL certificate
  ansible.builtin.command: >
    certbot --nginx -d {{ domain }}{% if use_www %} -d www.{{ domain }}{% endif %}
    --non-interactive --agree-tos -m {{ admin_email }} --redirect --expand
  args:
    creates: /etc/letsencrypt/live/{{ domain }}/fullchain.pem
  when: enable_ssl | default(true)
  failed_when: false

- name: Enable Certbot renewal timer
  ansible.builtin.service:
    name: certbot.timer
    state: started
    enabled: true
  when: enable_ssl | default(true)
  failed_when: false

# --------------------------------------------------------
# File Permissions (Final Pass)
# --------------------------------------------------------
- name: Set WordPress directory ownership
  ansible.builtin.file:
    path: /var/www/{{ domain }}
    state: directory
    owner: www-data
    group: www-data
    recurse: true

- name: Lock wp-config.php
  ansible.builtin.file:
    path: /var/www/{{ domain }}/wp-config.php
    owner: www-data
    group: www-data
    mode: "0640"
  failed_when: false

# --------------------------------------------------------
# Save Credentials
# --------------------------------------------------------
- name: Save credentials to file
  ansible.builtin.template:
    src: wp-credentials.j2
    dest: /root/.wp-credentials
    owner: root
    group: root
    mode: "0600"

- name: Display generated credentials
  ansible.builtin.debug:
    msg: |
      ===================================================================
      WordPress + phpMyAdmin installation complete for: {{ domain }}

      Credentials saved to: /root/.wp-credentials (mode 600)

      MySQL root password: {{ mysql_root_pass }}

      WordPress DB:
        DB name: {{ wp_db_name }}
        DB user: {{ wp_db_user }}
        DB password: {{ wp_db_pass }}

      WordPress admin account:
        Username: {{ wp_admin_user }}
        Password: {{ wp_admin_pass }}
        Admin email: {{ admin_email }}

      phpMyAdmin URL: https://{{ domain }}/phpmyadmin
      ===================================================================
